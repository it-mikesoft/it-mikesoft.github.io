<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signal Brief — Archivio puntate</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            line-height: 1.65;
            color: #1a1a1a;
            background: #faf8f4;
            padding: 2rem 1.5rem 4rem;
            max-width: 760px;
            margin: 0 auto;
        }

        a { color: #2563eb; text-decoration: none; }
        a:hover { text-decoration: underline; }

        .nav {
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 1.5rem;
        }
        .nav a { color: #666; }

        header {
            margin-bottom: 2.5rem;
            padding-bottom: 1.25rem;
            border-bottom: 1px solid #e2ddd6;
        }
        .logo {
            font-family: Georgia, 'Times New Roman', serif;
            font-size: 1.65rem;
            font-weight: 600;
            letter-spacing: -0.01em;
            margin-bottom: 0.15rem;
        }
        .logo span { color: #f59e0b; }
        header .tagline {
            color: #6b7280;
            font-size: 0.8rem;
            font-family: 'IBM Plex Mono', ui-monospace, monospace;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        /* List view */
        h2.section-title {
            font-size: 0.8rem;
            font-family: 'IBM Plex Mono', ui-monospace, monospace;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #9ca3af;
            margin: 1.25rem 0 1rem;
        }
        .intro-blurb {
            font-size: 0.92rem;
            color: #4b5563;
            margin-bottom: 1.5rem;
            line-height: 1.7;
        }
        .episode-list { list-style: none; }
        .episode-card {
            display: block;
            padding: 1.25rem 1.5rem;
            margin-bottom: 1rem;
            background: #fff;
            border: 1px solid #e2ddd6;
            border-radius: 6px;
            color: inherit;
            transition: transform 0.12s, border-color 0.12s, box-shadow 0.12s;
        }
        .episode-card:hover {
            text-decoration: none;
            border-color: #9ca3af;
            transform: translateY(-1px);
            box-shadow: 0 3px 12px rgba(0,0,0,0.06);
        }
        .episode-card .date {
            font-family: 'IBM Plex Mono', ui-monospace, monospace;
            font-size: 0.7rem;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        .episode-card h2 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-top: 0.3rem;
            margin-bottom: 0.5rem;
            color: #1a1a1a;
            letter-spacing: -0.005em;
        }
        .episode-card .meta {
            font-size: 0.8rem;
            color: #6b7280;
            font-family: 'IBM Plex Mono', ui-monospace, monospace;
        }
        .episode-card .thinkers {
            margin-top: 0.5rem;
            font-size: 0.78rem;
            color: #9ca3af;
        }

        /* Detail view */
        .back-link {
            display: inline-block;
            margin-bottom: 1rem;
            font-size: 0.82rem;
            color: #6b7280;
            font-family: 'IBM Plex Mono', ui-monospace, monospace;
        }
        .back-link:before { content: "← "; }

        .episode-header h1 {
            font-size: 1.75rem;
            line-height: 1.25;
            margin-bottom: 0.35rem;
            font-weight: 600;
            letter-spacing: -0.01em;
        }
        .episode-header .date-line {
            font-family: 'IBM Plex Mono', ui-monospace, monospace;
            font-size: 0.72rem;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 0.35rem;
        }
        .episode-header .meta-line {
            font-size: 0.82rem;
            color: #6b7280;
            font-family: 'IBM Plex Mono', ui-monospace, monospace;
            margin-bottom: 1.5rem;
        }

        audio {
            width: 100%;
            margin-bottom: 2rem;
        }

        .tabs {
            display: flex;
            gap: 0.25rem;
            border-bottom: 1px solid #e2ddd6;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        .tab {
            font-family: 'IBM Plex Mono', ui-monospace, monospace;
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            padding: 0.65rem 1rem;
            background: transparent;
            border: none;
            border-bottom: 2px solid transparent;
            color: #9ca3af;
            cursor: pointer;
            transition: color 0.15s, border-color 0.15s;
        }
        .tab:hover:not(.active) { color: #6b7280; }
        .tab.active { color: #1a1a1a; border-bottom-color: #1a1a1a; }

        .panel { display: none; }
        .panel.active { display: block; }

        /* Script text panel */
        .script-chapter {
            margin-bottom: 1.75rem;
            padding-left: 1.1rem;
            border-left: 3px solid #e5e7eb;
        }
        .script-chapter.mood-geo    { border-color: #6b7280; }
        .script-chapter.mood-soft   { border-color: #9ca3af; }
        .script-chapter.mood-tech   { border-color: #2563eb; }
        .script-chapter.mood-upbeat { border-color: #059669; }
        .script-chapter p {
            margin-bottom: 0.85rem;
            font-size: 1rem;
            line-height: 1.7;
        }
        .script-chapter p:last-child { margin-bottom: 0; }
        .script-fonti {
            margin-top: 1rem;
            padding: 0.75rem 1rem;
            background: #faf8f4;
            border: 1px dashed #e2ddd6;
            border-radius: 4px;
            font-size: 0.82rem;
        }
        .script-fonti .label {
            font-family: 'IBM Plex Mono', ui-monospace, monospace;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #9ca3af;
            margin-bottom: 0.4rem;
        }
        .script-fonti ul { list-style: none; }
        .script-fonti li {
            margin-bottom: 0.25rem;
            padding-left: 0.9rem;
            position: relative;
            line-height: 1.5;
        }
        .script-fonti li:last-child { margin-bottom: 0; }
        .script-fonti li:before {
            content: "→";
            position: absolute;
            left: 0;
            color: #9ca3af;
        }
        .script-fonti a { word-break: break-word; }

        /* Synthesis panel */
        .synthesis-body p { margin-bottom: 0.9rem; font-size: 1rem; line-height: 1.7; }
        .synthesis-body h1, .synthesis-body h2, .synthesis-body h3 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-top: 1.5rem;
            margin-bottom: 0.5rem;
        }
        .synthesis-body h1:first-child,
        .synthesis-body h2:first-child,
        .synthesis-body h3:first-child { margin-top: 0; }

        /* Concept diff panel */
        .diff-subtabs {
            display: flex;
            gap: 0.3rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }
        .diff-subtab {
            font-family: 'IBM Plex Mono', ui-monospace, monospace;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            padding: 0.4rem 0.8rem;
            background: #fff;
            border: 1px solid #e2ddd6;
            border-radius: 4px;
            color: #6b7280;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }
        .diff-subtab:hover { border-color: #9ca3af; }
        .diff-subtab.active { color: #1a1a1a; border-color: #1a1a1a; background: #f3f4f6; }
        .diff-subtab-count {
            background: #f3f4f6;
            padding: 0 0.4rem;
            border-radius: 8px;
            font-size: 0.65rem;
        }
        .diff-subtab.active .diff-subtab-count { background: #fff; }

        .diff-item {
            padding: 0.75rem 1rem;
            margin-bottom: 0.5rem;
            border-radius: 4px;
            background: #fff;
            border-left: 3px solid #d1d5db;
            font-size: 0.9rem;
            line-height: 1.55;
        }
        .diff-item.mood-emerging    { background: #f0fdf4; border-left-color: #22c55e; }
        .diff-item.mood-tensions    { background: #faf5ff; border-left-color: #7c3aed; }
        .diff-item.mood-evolved     { background: #fffbeb; border-left-color: #f59e0b; }
        .diff-item.mood-stable      { background: #f9fafb; border-left-color: #d1d5db; }
        .diff-item.mood-disappeared { background: #fef2f2; border-left-color: #ef4444; }
        .diff-item .title { font-weight: 600; margin-bottom: 0.25rem; }
        .diff-item .detail { font-size: 0.85rem; color: #6b7280; margin-bottom: 0.2rem; }
        .diff-item .who {
            font-size: 0.72rem;
            color: #9ca3af;
            margin-top: 0.35rem;
            font-family: 'IBM Plex Mono', ui-monospace, monospace;
        }
        .diff-empty {
            padding: 2rem 1rem;
            text-align: center;
            font-family: 'IBM Plex Mono', ui-monospace, monospace;
            font-size: 0.82rem;
            color: #9ca3af;
        }

        /* Sources panel */
        .thinker-fonti {
            margin-bottom: 1.75rem;
            padding-bottom: 1.25rem;
            border-bottom: 1px solid #e2ddd6;
        }
        .thinker-fonti:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .thinker-fonti h3 {
            font-size: 1.02rem;
            font-weight: 600;
            margin-bottom: 0.15rem;
            letter-spacing: -0.005em;
        }
        .thinker-fonti .handle {
            font-size: 0.75rem;
            color: #6b7280;
            margin-bottom: 0.7rem;
            font-family: 'IBM Plex Mono', ui-monospace, monospace;
        }
        .thinker-fonti ul { list-style: none; }
        .thinker-fonti li {
            margin-bottom: 0.4rem;
            padding-left: 1rem;
            position: relative;
            font-size: 0.88rem;
            line-height: 1.55;
        }
        .thinker-fonti li:before {
            content: "→";
            position: absolute;
            left: 0;
            color: #9ca3af;
        }
        .thinker-fonti a { word-break: break-word; }

        .state-note {
            padding: 2rem 1rem;
            text-align: center;
            color: #9ca3af;
            font-family: 'IBM Plex Mono', ui-monospace, monospace;
            font-size: 0.85rem;
        }

        footer {
            margin-top: 3.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid #e2ddd6;
            color: #6b7280;
            font-size: 0.8rem;
            font-family: 'IBM Plex Mono', ui-monospace, monospace;
        }

        @media (prefers-color-scheme: dark) {
            body { background: #1f1d18; color: #e5e5e5; }
            header, .tabs, .thinker-fonti, footer { border-color: #3a352d; }
            .logo { color: #f5f5f5; }
            header .tagline, .nav a, .state-note, footer, .episode-header .meta-line, .episode-card .meta { color: #9ca3af; }
            .episode-card { background: #2a2823; border-color: #3a352d; }
            .episode-card h2, .episode-header h1 { color: #f5f5f5; }
            .episode-card:hover { border-color: #52493b; }
            .tab.active { color: #f5f5f5; border-bottom-color: #f5f5f5; }
            .diff-subtab { background: #2a2823; border-color: #3a352d; color: #9ca3af; }
            .diff-subtab.active { background: #3a352d; color: #f5f5f5; border-color: #52493b; }
            .diff-item { background: #2a2823; color: #e5e5e5; }
            .diff-item.mood-emerging    { background: #052e16; }
            .diff-item.mood-tensions    { background: #2e1065; }
            .diff-item.mood-evolved     { background: #422006; }
            .diff-item.mood-stable      { background: #1f1f1f; }
            .diff-item.mood-disappeared { background: #450a0a; }
            .diff-item .detail { color: #a3a3a3; }
            .diff-item .who { color: #737373; }
            .thinker-fonti h3 { color: #f5f5f5; }
            .intro-blurb { color: #9ca3af; }
            .script-fonti { background: #2a2823; border-color: #3a352d; }
            .script-fonti .label { color: #737373; }
        }
    </style>
</head>
<body>
    <div class="nav"><a href="../">← Signal.Brief dashboard</a></div>

    <div id="app">
        <div class="state-note">Caricamento…</div>
    </div>

    <footer>
        <p>Signal Brief · briefing quotidiano tech/AI generato automaticamente · <a href="feed.xml">feed RSS</a></p>
    </footer>

<script>
(function () {
    // Sidecars live as siblings in episodes/: .mp3 .txt .json .synthesis.md .diff.json .fonti.json
    const EPISODES_BASE = "./episodes";

    const app = document.getElementById("app");

    // ── Utilities ────────────────────────────────────────────────────────
    function el(tag, props, children) {
        const e = document.createElement(tag);
        props = props || {};
        for (const k in props) {
            if (k === "class") e.className = props[k];
            else if (k === "html") e.innerHTML = props[k];
            else if (k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(), props[k]);
            else e.setAttribute(k, props[k]);
        }
        const kids = [].concat(children || []);
        for (const c of kids) {
            if (c == null) continue;
            e.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
        }
        return e;
    }

    function formatDuration(seconds) {
        if (!seconds) return "";
        const m = Math.floor(seconds / 60);
        const s = Math.floor(seconds % 60).toString().padStart(2, "0");
        return `${m}:${s}`;
    }

    function formatDate(isoDate) {
        const [y, m, d] = isoDate.split("-").map(Number);
        const months = ["gennaio","febbraio","marzo","aprile","maggio","giugno","luglio","agosto","settembre","ottobre","novembre","dicembre"];
        const dows = ["domenica","lunedì","martedì","mercoledì","giovedì","venerdì","sabato"];
        const dow = dows[new Date(y, m - 1, d).getDay()];
        return `${dow} ${d} ${months[m-1]} ${y}`;
    }

    function escapeHtml(s) {
        return s.replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
    }

    // Minimal markdown → HTML: paragraphs, headers, links, bold, italic.
    // Good enough for the synthesis text which is mostly prose with occasional markdown links.
    function renderMarkdown(md) {
        if (!md) return "";
        const blocks = md.split(/\n{2,}/);
        return blocks.map(block => {
            block = block.trim();
            if (!block) return "";
            const heading = block.match(/^(#{1,4})\s+(.*)$/);
            if (heading) {
                const level = heading[1].length;
                return `<h${level}>${inline(heading[2])}</h${level}>`;
            }
            return `<p>${inline(block)}</p>`;
        }).join("\n");
    }

    function inline(text) {
        let s = escapeHtml(text);
        s = s.replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
        s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
        s = s.replace(/(^|[^*])\*([^*]+)\*/g, '$1<em>$2</em>');
        s = s.replace(/\n/g, "<br>");
        return s;
    }

    // ── Router ───────────────────────────────────────────────────────────
    function currentEp() {
        return new URLSearchParams(location.search).get("ep");
    }

    window.addEventListener("popstate", route);

    function navigateTo(ep) {
        const url = ep ? `?ep=${ep}` : location.pathname;
        history.pushState(null, "", url);
        route();
    }

    async function route() {
        app.innerHTML = '<div class="state-note">Caricamento…</div>';
        const ep = currentEp();
        try {
            if (ep) await renderDetail(ep);
            else await renderList();
        } catch (e) {
            console.error(e);
            app.innerHTML = `<div class="state-note">Errore nel caricamento: ${escapeHtml(e.message || String(e))}</div>`;
        }
    }

    // ── List view ────────────────────────────────────────────────────────
    async function renderList() {
        const res = await fetch(`${EPISODES_BASE}/index.json`, { cache: "no-cache" });
        if (!res.ok) throw new Error(`index.json: ${res.status}`);
        const data = await res.json();
        const episodes = data.episodes || [];

        app.innerHTML = "";
        app.appendChild(el("header", {}, [
            el("div", { class: "logo" }, [document.createTextNode("Signal"), el("span", {}, "."), document.createTextNode("Brief")]),
            el("div", { class: "tagline" }, "Archivio puntate · Intelligence Dashboard"),
        ]));

        app.appendChild(el("p", { class: "intro-blurb" },
            "Briefing quotidiano tech/AI. Ogni episodio ruota intorno a ciò che è cambiato dal giorno precedente — emergenti, tensioni, fratture — argomentato attraverso 5 o 6 pensatori. Testo completo, sintesi della giornata, comparazione concetti e link alle fonti per ogni episodio."
        ));

        if (episodes.length === 0) {
            app.appendChild(el("div", { class: "state-note" }, "Nessun episodio disponibile."));
            return;
        }

        app.appendChild(el("h2", { class: "section-title" }, `${episodes.length} episod${episodes.length === 1 ? "io" : "i"}`));

        const ul = el("ul", { class: "episode-list" });
        for (const ep of episodes) {
            const thinkers = (ep.thinkers_mentioned || []).join(" · ");
            const metaBits = [];
            if (ep.duration_seconds) metaBits.push(formatDuration(ep.duration_seconds));
            if (ep.word_count) metaBits.push(`${ep.word_count} parole`);
            const card = el("a", {
                class: "episode-card",
                href: `?ep=${ep.date}`,
                onclick: (e) => { e.preventDefault(); navigateTo(ep.date); }
            }, [
                el("div", { class: "date" }, formatDate(ep.date)),
                el("h2", {}, ep.title || ep.date),
                metaBits.length ? el("div", { class: "meta" }, metaBits.join(" · ")) : null,
                thinkers ? el("div", { class: "thinkers" }, thinkers) : null,
            ]);
            ul.appendChild(card);
        }
        app.appendChild(ul);
    }

    // ── Detail view ──────────────────────────────────────────────────────
    async function renderDetail(date) {
        const base = `${EPISODES_BASE}/${date}`;
        // Fetch every sidecar in parallel; tolerate missing optional ones so older
        // episodes without the sidecar layout still render what they can.
        const [meta, script, synthesis, diff, fonti] = await Promise.all([
            fetch(`${base}.json`).then(r => r.ok ? r.json() : null),
            fetch(`${base}.txt`).then(r => r.ok ? r.text() : ""),
            fetch(`${base}.synthesis.md`).then(r => r.ok ? r.text() : ""),
            fetch(`${base}.diff.json`).then(r => r.ok ? r.json() : null),
            fetch(`${base}.fonti.json`).then(r => r.ok ? r.json() : []),
        ]);

        if (!meta) {
            app.innerHTML = `<div class="state-note">Episodio ${escapeHtml(date)} non trovato.</div>`;
            return;
        }

        app.innerHTML = "";

        app.appendChild(el("a", {
            class: "back-link",
            href: "./",
            onclick: (e) => { e.preventDefault(); navigateTo(null); }
        }, "Tutti gli episodi"));

        const metaBits = [];
        if (meta.duration_seconds) metaBits.push(formatDuration(meta.duration_seconds));
        if (meta.word_count) metaBits.push(`${meta.word_count} parole`);
        if (meta.chapter_count) metaBits.push(`${meta.chapter_count} capitoli`);

        app.appendChild(el("header", { class: "episode-header" }, [
            el("div", { class: "date-line" }, formatDate(meta.date)),
            el("h1", {}, meta.title || meta.date),
            el("div", { class: "meta-line" }, metaBits.join(" · ")),
        ]));

        // Audio player
        const audio = el("audio", { controls: "", preload: "metadata" });
        audio.src = `./${meta.mp3_url}`;
        app.appendChild(audio);

        // Tabs
        const tabDefs = [
            { key: "testo", label: "Testo" },
            { key: "sintesi", label: "Sintesi" },
            { key: "comparazione", label: "Comparazione" },
            { key: "fonti", label: `Fonti (${fonti.length})` },
        ];
        const tabsEl = el("div", { class: "tabs" });
        const panels = {};
        for (const t of tabDefs) {
            const btn = el("button", {
                class: "tab",
                onclick: () => {
                    for (const k in panels) panels[k].classList.remove("active");
                    tabsEl.querySelectorAll(".tab").forEach(x => x.classList.remove("active"));
                    btn.classList.add("active");
                    panels[t.key].classList.add("active");
                }
            }, t.label);
            tabsEl.appendChild(btn);
        }
        app.appendChild(tabsEl);

        panels.testo = buildScriptPanel(script, fonti);
        panels.sintesi = buildSynthesisPanel(synthesis);
        panels.comparazione = buildDiffPanel(diff);
        panels.fonti = buildFontiPanel(fonti);

        for (const key in panels) app.appendChild(panels[key]);

        tabsEl.querySelector(".tab").classList.add("active");
        panels.testo.classList.add("active");
    }

    // Build a small "Fonti citate" box to append at the end of a chapter.
    // Used inside script chapters so the reader can follow links to the original
    // articles without jumping to the Fonti tab.
    function buildInlineFonti(thinker) {
        if (!thinker || !thinker.sources || thinker.sources.length === 0) return null;
        const box = el("div", { class: "script-fonti" }, [
            el("div", { class: "label" }, `Fonti · ${thinker.name}`),
        ]);
        const ul = el("ul");
        for (const s of thinker.sources) {
            ul.appendChild(el("li", {}, [
                el("a", { href: s.url, target: "_blank", rel: "noopener" }, s.title || s.url),
            ]));
        }
        box.appendChild(ul);
        return box;
    }

    function buildScriptPanel(script, fonti) {
        const panel = el("div", { class: "panel" });
        if (!script) {
            panel.appendChild(el("div", { class: "state-note" }, "Testo non disponibile."));
            return panel;
        }
        const re = /\[CHAPTER\s+mood=(\w+)\]\s*\n/g;
        const parts = script.split(re);
        if (parts.length < 3) {
            // No [CHAPTER] markers — render whole thing as one flat block
            const chap = el("div", { class: "script-chapter mood-soft" });
            for (const para of script.split(/\n{2,}/)) {
                if (para.trim()) chap.appendChild(el("p", { html: inline(para.trim()) }));
            }
            panel.appendChild(chap);
            return panel;
        }
        // fonti is in episode order: the N-th mood=tech chapter maps to fonti[N].
        // Any chapter whose first ~220 chars actually name-match a specific thinker
        // overrides the positional mapping (defensive against mood ordering drift).
        const fontiByName = {};
        for (const f of (fonti || [])) {
            const last = f.name.split(" ").slice(-1)[0].toLowerCase();
            fontiByName[f.name.toLowerCase()] = f;
            if (last.length >= 4) fontiByName[last] = f;
        }
        let techIdx = 0;
        for (let i = 1; i < parts.length - 1; i += 2) {
            const mood = parts[i];
            const body = parts[i + 1].trim();
            if (!body) continue;
            const chap = el("div", { class: `script-chapter mood-${mood}` });
            for (const para of body.split(/\n{2,}/)) {
                if (para.trim()) chap.appendChild(el("p", { html: inline(para.trim()) }));
            }
            if (mood === "tech") {
                // Try name match first (more accurate), fall back to positional.
                let thinker = null;
                const head = body.slice(0, 260).toLowerCase();
                for (const k in fontiByName) {
                    if (head.indexOf(k) !== -1) { thinker = fontiByName[k]; break; }
                }
                if (!thinker && fonti && fonti[techIdx]) thinker = fonti[techIdx];
                const fontiBox = buildInlineFonti(thinker);
                if (fontiBox) chap.appendChild(fontiBox);
                techIdx++;
            }
            panel.appendChild(chap);
        }
        return panel;
    }

    function buildSynthesisPanel(synthesis) {
        const panel = el("div", { class: "panel" });
        if (!synthesis) {
            panel.appendChild(el("div", { class: "state-note" }, "Sintesi non disponibile."));
            return panel;
        }
        panel.appendChild(el("div", { class: "synthesis-body", html: renderMarkdown(synthesis) }));
        return panel;
    }

    function buildDiffPanel(diff) {
        const panel = el("div", { class: "panel" });
        if (!diff) {
            panel.appendChild(el("div", { class: "state-note" }, "Comparazione non disponibile per questo episodio."));
            return panel;
        }
        const catOrder = [
            { key: "emerging",    label: "Emergenti",  icon: "🟢" },
            { key: "tensions",    label: "Tensioni",   icon: "⚡" },
            { key: "evolved",     label: "Evoluti",    icon: "🟡" },
            { key: "stable",      label: "Stabili",    icon: "⚪" },
            { key: "disappeared", label: "Scomparsi",  icon: "🔴" },
        ];

        const subtabsEl = el("div", { class: "diff-subtabs" });
        const bodyEl = el("div");

        function renderCat(key) {
            bodyEl.innerHTML = "";
            const items = diff[key] || [];
            if (!items.length) {
                bodyEl.appendChild(el("div", { class: "diff-empty" }, "Nessun elemento in questa categoria."));
                return;
            }
            for (const raw of items) {
                const norm = normalizeDiffItem(raw, key);
                if (!norm) continue;
                const div = el("div", { class: `diff-item mood-${key}` });
                if (norm.title) div.appendChild(el("div", { class: "title" }, norm.title));
                if (norm.detail) div.appendChild(el("div", { class: "detail" }, norm.detail));
                if (norm.sides && norm.sides.length) {
                    for (const s of norm.sides) {
                        div.appendChild(el("div", { class: "detail" }, "• " + s));
                    }
                }
                if (norm.who && norm.who.length) {
                    div.appendChild(el("div", { class: "who" }, norm.who.join(", ")));
                }
                bodyEl.appendChild(div);
            }
        }

        for (const c of catOrder) {
            const count = (diff[c.key] || []).length;
            const btn = el("button", {
                class: "diff-subtab",
                onclick: () => {
                    subtabsEl.querySelectorAll(".diff-subtab").forEach(x => x.classList.remove("active"));
                    btn.classList.add("active");
                    renderCat(c.key);
                }
            }, [
                `${c.icon} ${c.label}`,
                el("span", { class: "diff-subtab-count" }, String(count)),
            ]);
            subtabsEl.appendChild(btn);
        }
        panel.appendChild(subtabsEl);
        panel.appendChild(bodyEl);
        subtabsEl.querySelector(".diff-subtab").classList.add("active");
        renderCat("emerging");
        return panel;
    }

    function normalizeDiffItem(raw, category) {
        if (raw == null) return null;
        if (typeof raw === "string") return { title: raw };
        if (typeof raw !== "object") return null;
        if (category === "evolved") {
            const from = raw.from != null ? raw.from : (raw.da != null ? raw.da : (raw.before || ""));
            const to   = raw.to   != null ? raw.to   : (raw.a  != null ? raw.a  : (raw.after  || ""));
            const detail = from && to ? `${from} → ${to}` : (from || to || raw.detail || "");
            return { title: raw.concept || raw.title || "", detail: detail, who: raw.who || [] };
        }
        if (category === "tensions") {
            return {
                title: raw.axis || raw.concept || raw.title || "",
                detail: raw.detail || "",
                sides: raw.sides || [],
                who: raw.who || [],
            };
        }
        return {
            title: raw.concept || raw.title || raw.name || "",
            detail: raw.detail || raw.description || "",
            who: raw.who || [],
        };
    }

    function buildFontiPanel(fonti) {
        const panel = el("div", { class: "panel" });
        if (!fonti || fonti.length === 0) {
            panel.appendChild(el("div", { class: "state-note" }, "Nessuna fonte disponibile per questo episodio."));
            return panel;
        }
        for (const t of fonti) {
            const handleChildren = [];
            if (t.handle) {
                handleChildren.push(el("a", {
                    href: `https://x.com/${t.handle.replace("@", "")}`,
                    target: "_blank", rel: "noopener"
                }, t.handle));
            }
            if (t.domain) {
                handleChildren.push(document.createTextNode((t.handle ? " · " : "") + t.domain));
            }
            const block = el("div", { class: "thinker-fonti" }, [
                el("h3", {}, t.name),
                handleChildren.length ? el("div", { class: "handle" }, handleChildren) : null,
            ]);
            const ul = el("ul");
            for (const s of t.sources || []) {
                const li = el("li", {}, [
                    el("a", { href: s.url, target: "_blank", rel: "noopener" }, s.title || s.url),
                ]);
                ul.appendChild(li);
            }
            block.appendChild(ul);
            panel.appendChild(block);
        }
        return panel;
    }

    // Go
    route();
})();
</script>
</body>
</html>
